services:
  postgres:
    image: postgres:16
    container_name: sentineliq-postgres
    environment:
      POSTGRES_DB: sentineliq
      POSTGRES_USER: sentineliq
      POSTGRES_PASSWORD: sentineliq_password
    ports:
      - "5432:5432"
    volumes:
      - sentineliq_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sentineliq-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: sentineliq-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: sentineliq-frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  sentineliq_postgres_data: